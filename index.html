<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crosstalk Mandarin Tutor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Tutor settings">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">中</div>
          <div>
            <h1>Crosstalk Tutor</h1>
            <p>Mandarin input for beginners</p>
          </div>
        </div>

        <section class="panel">
          <h2>Scene</h2>
          <div class="scene-grid" id="sceneGrid"></div>
        </section>

        <section class="panel">
          <h2>Input style</h2>
          <label class="field">
            <span>Level</span>
            <select id="levelSelect">
              <option value="hsk1">HSK 1: very simple</option>
              <option value="hsk2">HSK 2: a little richer</option>
            </select>
          </label>
          <label class="field">
            <span>Your topic or text</span>
            <textarea id="topicInput" rows="5" placeholder="Example: ordering noodles, asking about a painting, a hard Chinese paragraph..."></textarea>
          </label>
          <div class="button-row">
            <button class="primary" id="makeLessonBtn" type="button">Make Lesson</button>
            <button class="secondary" id="clearBtn" type="button" aria-label="Clear topic">Clear</button>
          </div>
        </section>

        <section class="panel">
          <h2>Study Flow</h2>
          <div class="stat-grid">
            <div>
              <strong id="savedCount">0</strong>
              <span>saved</span>
            </div>
            <div>
              <strong id="reviewCount">0</strong>
              <span>due</span>
            </div>
            <div>
              <strong id="studiedCount">0</strong>
              <span>studied</span>
            </div>
          </div>
          <div class="button-row stackable">
            <button class="secondary" id="exportBtn" type="button">Export Data</button>
            <label class="import-label">
              Import
              <input id="importInput" type="file" accept="application/json" />
            </label>
          </div>
        </section>
      </aside>

      <main class="workspace">
        <section class="lesson-card" aria-labelledby="lessonTitle">
          <div class="lesson-top">
            <div>
              <p class="eyebrow" id="lessonMode">听中文，不用说中文</p>
              <h2 id="lessonTitle">今天我们慢慢听。</h2>
            </div>
            <div class="tool-strip" aria-label="Lesson tools">
              <button id="slowBtn" class="icon-button active" type="button" title="Slower, shorter Chinese">慢</button>
              <button id="saveBtn" class="icon-button" type="button" title="Save lesson">Save</button>
              <button id="studiedBtn" class="icon-button" type="button" title="Mark studied">Done</button>
              <button id="packetBtn" class="icon-button" type="button" title="Open printable packet">PDF</button>
              <button id="copyBtn" class="icon-button" type="button" title="Copy lesson text">Copy</button>
            </div>
          </div>

          <div class="visual-band" aria-hidden="true">
            <div class="sun-disc"></div>
            <div class="mountain mountain-one"></div>
            <div class="mountain mountain-two"></div>
            <div class="river"></div>
            <div class="lantern">语</div>
          </div>

          <article class="lesson-body">
            <div class="line-stack" id="lessonLines"></div>
          </article>

          <div class="support-grid">
            <section>
              <h3>生词</h3>
              <div class="vocab-list" id="vocabList"></div>
            </section>
            <section>
              <h3>小问题</h3>
              <div class="checks" id="checksList"></div>
            </section>
          </div>
        </section>

        <div class="right-rail">
          <section class="chat-panel" aria-labelledby="chatTitle">
            <div class="chat-header">
              <h2 id="chatTitle">Gentle Crosstalk</h2>
              <p>You can answer in English, click, or just read.</p>
            </div>
            <div class="chat-log" id="chatLog" aria-live="polite"></div>
            <div class="reply-bar">
              <button type="button" data-reply="yes">I understand</button>
              <button type="button" data-reply="more">More examples</button>
              <button type="button" data-reply="easy">Make it easier</button>
            </div>
          </section>

          <section class="library-panel" aria-labelledby="libraryTitle">
            <div class="chat-header">
              <h2 id="libraryTitle">Lesson Library</h2>
              <p>Saved locally in this browser.</p>
            </div>
            <div class="library-list" id="libraryList"></div>
            <label class="notes-field">
              <span>Study notes</span>
              <textarea id="notesInput" rows="4" placeholder="What felt easy? What should come back later?"></textarea>
            </label>
          </section>
        </div>
      </main>
    </div>

    <section class="packet" id="packetView" aria-hidden="true">
      <div class="packet-sheet">
        <button type="button" class="close-packet" id="closePacketBtn">Close</button>
        <div class="packet-actions">
          <button type="button" id="printBtn">Print or Save PDF</button>
        </div>
        <h2>中文学习小包</h2>
        <p class="packet-note">简单汉字版 · 拼音+汉字版 · 生词 · 语法小点 · 小问题</p>
        <div id="packetContent"></div>
      </div>
    </section>

    <script src="app.js"></script>
  </body>
</html>
